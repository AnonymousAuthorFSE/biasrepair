# Ablation: w/o RAG — same number of randomly sampled inclusive exemplars (controls prompt length)
seed: 42
data:
  dataset_dir: data/dataset
  splits_dir: data/splits
  exemplars_path: data/exemplars/bias_free_exemplars.jsonl
  limit: null

rag:
  enabled: false
  model_name: sentence-transformers/all-MiniLM-L6-v2
  k: 3
  random_exemplars_count: 3  # same as k=3 for full; randomly sampled inclusive exemplars
  index_only_train: true
  index_path: data/rag_index

generator:
  model_name: meta-llama/Llama-3.1-8B-Instruct
  max_new_tokens: 256
  temperature: 0.7
  do_sample: true

self_consistency:
  enabled: true
  n: 5
  selection: semantic_similarity

reflection:
  enabled: true
  retry_budget: 2
  flag_manual_review_on_failure: true

evaluation:
  bootstrap_resamples: 1000
  bootstrap_alpha: 0.05

prompts_dir: prompts
run_dir: null
