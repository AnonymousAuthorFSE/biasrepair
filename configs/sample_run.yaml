# Sample run on synthetic data (small limit) for quick validation
seed: 42
data:
  dataset_dir: data/sample
  splits_dir: data/sample/splits
  exemplars_path: data/sample/exemplars.jsonl
  limit: 10

rag:
  enabled: true
  model_name: sentence-transformers/all-MiniLM-L6-v2
  k: 2
  index_only_train: true
  index_path: data/sample/rag_index

generator:
  model_name: meta-llama/Llama-3.1-8B-Instruct
  max_new_tokens: 128
  temperature: 0.7
  do_sample: true

self_consistency:
  enabled: true
  n: 3
  selection: semantic_similarity

reflection:
  enabled: true
  retry_budget: 1
  flag_manual_review_on_failure: true

evaluation:
  bootstrap_resamples: 100
  bootstrap_alpha: 0.05

prompts_dir: prompts
run_dir: null
